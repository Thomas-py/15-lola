# Pegar en /etc/nginx/sites-available/qr15 en el VPS
# Luego: ln -s /etc/nginx/sites-available/qr15 /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name TU_DOMINIO.com;  # reemplazar

    # Redirigir HTTP → HTTPS (necesario para que la cámara funcione en móviles)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name TU_DOMINIO.com;  # reemplazar

    # Certificado SSL (usar Let's Encrypt: certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.com/privkey.pem;

    client_max_body_size 15M;

    # WebSocket upgrade
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # Todo lo demás → FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
