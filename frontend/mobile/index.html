<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1C0F3F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>XV de Lola ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple:   #7B5EA7;
      --lavender: #B39DDB;
      --gold:     #F4C430;
      --gold2:    #E8A020;
      --pink:     #E8A0B4;
      --bg:       #1C0F3F;
      --text:     #F0E8FF;
      --sub:      #B39DDB;
    }
    html, body { height: 100%; font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* Linternas */
    .lanterns { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .lantern { position: absolute; border-radius: 50% 50% 45% 45%; opacity: 0; animation: rise linear infinite; }
    @keyframes rise {
      0%   { transform: translateY(0); opacity: 0; }
      10%  { opacity: .7; }
      90%  { opacity: .4; }
      100% { transform: translateY(-110vh) translateX(30px); opacity: 0; }
    }
    .l1 { width:18px; height:24px; background:#F4C430; bottom:-30px; left:10%; animation-duration:9s;  animation-delay:0s; }
    .l2 { width:14px; height:18px; background:#E8A0B4; bottom:-30px; left:30%; animation-duration:12s; animation-delay:2s; }
    .l3 { width:20px; height:26px; background:#F4C430; bottom:-30px; left:55%; animation-duration:8s;  animation-delay:4s; }
    .l4 { width:12px; height:16px; background:#B39DDB; bottom:-30px; left:75%; animation-duration:11s; animation-delay:1s; }
    .l5 { width:16px; height:22px; background:#F4C430; bottom:-30px; left:88%; animation-duration:10s; animation-delay:3s; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 10%, rgba(123,94,167,.35) 0%, transparent 55%),
                  radial-gradient(ellipse at 80% 80%, rgba(244,196,48,.12) 0%, transparent 55%);
      z-index: 0; pointer-events: none;
    }

    #app { position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 24px 48px; }
    .screen { display: none; width: 100%; max-width: 400px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; gap: 20px; }

    .sun { font-size: 54px; line-height: 1; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(244,196,48,.6)); }
    @keyframes float { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-10px) rotate(3deg); } }

    .title { text-align: center; }
    .title h1 { font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 700; color: var(--gold); text-shadow: 0 0 30px rgba(244,196,48,.5); letter-spacing: .05em; }
    .title .subtitle { font-size: .9rem; color: var(--sub); margin-top: 8px; font-weight: 300; }

    .divider { display: flex; align-items: center; gap: 10px; width: 100%; color: var(--lavender); opacity: .5; font-size: .8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--lavender), transparent); }

    .btn { width: 100%; padding: 17px; border: none; border-radius: 50px; font-family: 'Lato', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: .05em; transition: transform .15s, box-shadow .15s; -webkit-tap-highlight-color: transparent; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: linear-gradient(135deg, var(--gold2), var(--gold)); color: #1C0F3F; box-shadow: 0 6px 28px rgba(244,196,48,.35); }
    .btn-secondary { background: rgba(179,157,219,.12); color: var(--lavender); border: 1px solid rgba(179,157,219,.3); }

    #cameraInput { display: none; }

    #previewImg { width: 100%; max-height: 52dvh; object-fit: contain; border-radius: 20px; border: 2px solid rgba(244,196,48,.3); background: #0d0621; box-shadow: 0 8px 40px rgba(0,0,0,.4); }

    .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,.1); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--gold)); border-radius: 99px; transition: width .1s linear; }

    .success-icon { font-size: 68px; animation: pop .4s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-text { text-align: center; }
    .success-text h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold); }
    .success-text p { color: var(--sub); margin-top: 8px; font-size: .9rem; font-weight: 300; }

    .error-msg { background: rgba(255,60,60,.12); border: 1px solid rgba(255,60,60,.25); color: #ff9090; padding: 12px 16px; border-radius: 12px; font-size: .85rem; text-align: center; width: 100%; }

.footer { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; font-size: .7rem; color: rgba(179,157,219,.3); letter-spacing: .05em; z-index: 1; }

    /* ── Banner sin conexión ── */
    #offlineBanner { position: fixed; top: 0; left: 0; right: 0; z-index: 500; background: rgba(180,40,40,.9); color: #fff; text-align: center; font-size: .8rem; padding: 10px; display: none; backdrop-filter: blur(4px); }
    #offlineBanner.show { display: block; }
  </style>
</head>
<body>

<div id="offlineBanner">⚠️ Sin conexión — reconectando...</div>

<div class="lanterns">
  <div class="lantern l1"></div><div class="lantern l2"></div>
  <div class="lantern l3"></div><div class="lantern l4"></div>
  <div class="lantern l5"></div>
</div>


<div id="app">
  <!-- INICIO -->
  <div id="s-home" class="screen active">
    <div class="sun">✨</div>
    <div class="title">
      <h1>XV de Lola</h1>
      <div class="subtitle">Sacá tu foto y aparecé en pantalla</div>
    </div>
    <div class="divider">🌸 🌸 🌸</div>
    <button class="btn btn-primary" onclick="openCamera()">📷 &nbsp;Tomar foto</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" />
  </div>

  <!-- PREVIEW -->
  <div id="s-preview" class="screen">
    <img id="previewImg" src="" alt="Vista previa" />
    <button class="btn btn-primary" onclick="sendPhoto()">Enviar a la pantalla 🌟</button>
    <button class="btn btn-secondary" onclick="openCamera()">Volver a tomar</button>
    <div id="uploadError" class="error-msg" style="display:none"></div>
  </div>

  <!-- ENVIANDO -->
  <div id="s-loading" class="screen">
    <div class="sun" style="animation:none;font-size:44px">🏮</div>
    <div class="title">
      <h1>Enviando...</h1>
      <div class="subtitle">Ya casi aparece en pantalla</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- ÉXITO -->
  <div id="s-success" class="screen">
    <div class="success-icon">🏮</div>
    <div class="success-text">
      <h2>¡Apareciste!</h2>
      <p>Tu foto ya está en la pantalla del salón</p>
    </div>
    <div class="divider">✨ ✨ ✨</div>
    <button class="btn btn-primary" onclick="goHome()">Tomar otra foto 📷</button>
  </div>
</div>

<div class="footer">✦ XV de Lola ✦</div>

<script>
  const API_BASE = window.location.origin;
  const WS_URL   = API_BASE.replace(/^http/, 'ws') + '/ws/mobile';

  let selectedFile = null;

  // ── WebSocket móvil (solo para photo_skipped) ────────────────────────────
  function connectMobileWS() {
    const ws = new WebSocket(WS_URL);
    ws.onopen  = () => { document.getElementById('offlineBanner').classList.remove('show'); };
    ws.onclose = () => { document.getElementById('offlineBanner').classList.add('show'); setTimeout(connectMobileWS, 3000); };
    ws.onerror = () => ws.close();
    setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 20000);
  }
  connectMobileWS();

  // ── Cámara ───────────────────────────────────────────────────────────────
  function openCamera() {
    const input = document.getElementById('cameraInput');
    input.value = '';
    input.click();
  }

  document.getElementById('cameraInput').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    compressImage(file, 1920, 0.82).then(blob => {
      selectedFile = new File([blob], file.name, { type: blob.type });
      document.getElementById('previewImg').src = URL.createObjectURL(blob);
      showScreen('s-preview');
    });
  });

  function compressImage(file, maxPx, quality) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          const ratio = Math.min(maxPx / w, maxPx / h);
          w = Math.round(w * ratio); h = Math.round(h * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(resolve, 'image/jpeg', quality);
      };
      img.src = url;
    });
  }

  function sendPhoto() {
    if (!selectedFile) return;
    showScreen('s-loading');
    const form = new FormData();
    form.append('file', selectedFile, selectedFile.name);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${API_BASE}/upload`);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable)
        document.getElementById('progressFill').style.width = Math.round((e.loaded / e.total) * 100) + '%';
    };
    xhr.onload = () => {
      if (xhr.status === 200) showScreen('s-success');
      else {
        let msg = 'Error al enviar. Intentá de nuevo.';
        try { msg = JSON.parse(xhr.responseText).detail || msg; } catch (_) {}
        showError(msg);
      }
    };
    xhr.onerror = () => showError('Sin conexión. Verificá tu red e intentá de nuevo.');
    xhr.send(form);
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function showError(msg) {
    const el = document.getElementById('uploadError');
    el.textContent = msg; el.style.display = 'block';
    showScreen('s-preview');
  }
  function goHome() {
    selectedFile = null;
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('uploadError').style.display = 'none';
    showScreen('s-home');
  }

  // ── Admin ────────────────────────────────────────────────────────────────
  if (new URLSearchParams(location.search).get('xvlola') === 'admin2026') {
    const btn = document.createElement('button');
    btn.textContent = '🎰 Iniciar Ruleta';
    btn.style.cssText = `
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: linear-gradient(135deg, #F4C430, #E8A020);
      color: #1C0F3F; font-family: 'Cinzel', serif; font-weight: 700;
      font-size: 1rem; padding: 14px 32px; border: none; border-radius: 50px;
      box-shadow: 0 4px 20px rgba(244,196,48,.5); cursor: pointer;
      letter-spacing: .05em;
    `;
    btn.onclick = async () => {
      btn.disabled = true;
      btn.textContent = '✨ Iniciando...';
      try {
        await fetch(`${API_BASE}/roulette/start`, { method: 'POST' });
        btn.textContent = '✅ ¡Listo!';
      } catch (_) {
        btn.textContent = '❌ Error';
      }
      setTimeout(() => { btn.disabled = false; btn.textContent = '🎰 Iniciar Ruleta'; }, 3000);
    };
    document.body.appendChild(btn);

    const skipBtn = document.createElement('button');
    skipBtn.textContent = '⏭️ Saltar foto';
    skipBtn.style.cssText = `
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: rgba(255,255,255,.12); backdrop-filter: blur(8px);
      color: #F0E8FF; font-family: 'Lato', sans-serif; font-weight: 700;
      font-size: .95rem; padding: 12px 28px; border: 1px solid rgba(179,157,219,.3);
      border-radius: 50px; cursor: pointer; letter-spacing: .04em;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    `;
    // Deshabilitar saltar si no hay foto en pantalla
    async function refreshSkipState() {
      try {
        const data = await fetch(`${API_BASE}/current-photo`).then(r => r.json());
        skipBtn.disabled = !data.photo;
        skipBtn.style.opacity = data.photo ? '1' : '0.4';
      } catch (_) {}
    }
    refreshSkipState();
    setInterval(refreshSkipState, 4000);

    skipBtn.onclick = async () => {
      skipBtn.disabled = true;
      skipBtn.textContent = '⏳ Saltando...';
      try {
        await fetch(`${API_BASE}/photo/skip`, { method: 'POST' });
        skipBtn.textContent = '✅ Saltada';
      } catch (_) {
        skipBtn.textContent = '❌ Error';
      }
      setTimeout(() => { skipBtn.textContent = '⏭️ Saltar foto'; refreshSkipState(); }, 2000);
    };
    document.body.appendChild(skipBtn);
  }
</script>
</body>
</html>
