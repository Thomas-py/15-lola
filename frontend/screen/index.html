<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XV de Lola — Pantalla</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple:   #7B5EA7;
      --lavender: #B39DDB;
      --gold:     #F4C430;
      --gold2:    #E8A020;
      --pink:     #E8A0B4;
      --bg:       #1C0F3F;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Lato', sans-serif; color: #fff; cursor: none; }

    /* Orbes */
    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .3; animation: drift ease-in-out infinite alternate; }
    .orb1 { width:600px; height:600px; background:var(--purple); top:-150px; left:-100px; animation-duration:16s; }
    .orb2 { width:400px; height:400px; background:var(--gold);   bottom:-100px; right:-80px; animation-duration:12s; opacity:.15; }
    .orb3 { width:300px; height:300px; background:var(--pink);   top:40%; left:60%; animation-duration:10s; opacity:.2; }
    @keyframes drift { from { transform:translate(0,0) scale(1); } to { transform:translate(50px,30px) scale(1.08); } }

    /* Linternas */
    .lanterns { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .lantern { position: absolute; border-radius: 50% 50% 45% 45%; opacity: 0; animation: rise linear infinite; }
    @keyframes rise { 0% { transform:translateY(0); opacity:0; } 8% { opacity:.6; } 92% { opacity:.3; } 100% { transform:translateY(-110vh) translateX(40px); opacity:0; } }
    .ll1 { width:28px; height:36px; background:#F4C430; bottom:-40px; left:5%;  animation-duration:14s; animation-delay:0s; }
    .ll2 { width:22px; height:28px; background:#E8A0B4; bottom:-40px; left:18%; animation-duration:18s; animation-delay:3s; }
    .ll3 { width:32px; height:42px; background:#F4C430; bottom:-40px; left:35%; animation-duration:11s; animation-delay:6s; }
    .ll4 { width:18px; height:24px; background:#B39DDB; bottom:-40px; left:52%; animation-duration:16s; animation-delay:1s; }
    .ll5 { width:26px; height:34px; background:#F4C430; bottom:-40px; left:68%; animation-duration:13s; animation-delay:4s; }
    .ll6 { width:20px; height:26px; background:#E8A0B4; bottom:-40px; left:82%; animation-duration:19s; animation-delay:7s; }
    .ll7 { width:24px; height:30px; background:#F4C430; bottom:-40px; left:92%; animation-duration:10s; animation-delay:2s; }

    /* Foto */
    #photoWrap { position:fixed; inset:0; z-index:2; display:flex; align-items:center; justify-content:center; }
    #photoImg { max-width:100%; max-height:100%; object-fit:contain; opacity:0; transition:opacity .8s ease; box-shadow:0 0 80px rgba(0,0,0,.7); }
    #photoImg.visible { opacity: 1; }
    #vignette { position:fixed; inset:0; z-index:3; background:radial-gradient(ellipse at center, transparent 50%, rgba(28,15,63,.7) 100%); pointer-events:none; opacity:0; transition:opacity .8s; }
    #vignette.visible { opacity: 1; }

    /* Barra superior */
    #topBar { position:fixed; top:0; left:0; right:0; z-index:10; padding:24px 40px; display:flex; justify-content:space-between; align-items:flex-start; background:linear-gradient(to bottom, rgba(28,15,63,.9), transparent); }
    .event-name { font-family:'Cinzel',serif; font-size:1.5rem; font-weight:700; color:var(--gold); text-shadow:0 0 20px rgba(244,196,48,.5); letter-spacing:.08em; }
    .event-sub { font-size:.75rem; color:rgba(179,157,219,.7); margin-top:4px; letter-spacing:.08em; text-transform:uppercase; font-weight:300; }
    #photoCount { text-align:right; }
    #photoCount .label { font-size:.7rem; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.1em; }
    #photoCount span { display:block; font-family:'Cinzel',serif; font-size:2rem; font-weight:700; color:rgba(255,255,255,.8); line-height:1; }

    /* Barra inferior */
    #bottomBar { position:fixed; bottom:0; left:0; right:0; z-index:10; padding:40px; background:linear-gradient(to top, rgba(28,15,63,.85), transparent); display:flex; justify-content:space-between; align-items:flex-end; }
    .qr-hint { display:flex; align-items:center; gap:14px; background:rgba(255,255,255,.07); backdrop-filter:blur(12px); border:1px solid rgba(244,196,48,.2); border-radius:16px; padding:14px 20px; }
    .qr-icon { font-size:2rem; }
    .qr-text { font-size:.8rem; line-height:1.5; color:rgba(255,255,255,.8); }
    .qr-text strong { display:block; font-size:.95rem; color:var(--gold); }

    /* Votos en pantalla */
    #voteBar { display:flex; gap:16px; align-items:center; }
    .vote-pill { background:rgba(255,255,255,.1); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.15); border-radius:99px; padding:8px 16px; font-size:1.1rem; display:flex; align-items:center; gap:6px; transition:transform .2s; }
    .vote-pill .cnt { font-size:.85rem; font-weight:700; color:rgba(255,255,255,.9); }

    /* Emojis flotantes */
    .float-emoji { position:fixed; z-index:50; font-size:2.5rem; pointer-events:none; animation:floatUp 2s ease-out forwards; }
    @keyframes floatUp { 0% { transform:translateY(0) scale(1); opacity:1; } 100% { transform:translateY(-200px) scale(1.4); opacity:0; } }

    /* Timer */
    #timerBar { position:fixed; bottom:0; left:0; right:0; height:3px; z-index:11; background:rgba(255,255,255,.08); }
    #timerFill { height:100%; background:linear-gradient(90deg, var(--purple), var(--gold)); }

    /* Badge */
    #newBadge { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); background:linear-gradient(135deg,var(--purple),var(--gold2)); color:#fff; font-size:1rem; font-weight:700; padding:12px 30px; border-radius:99px; z-index:30; pointer-events:none; transition:transform .35s cubic-bezier(.175,.885,.32,1.275), opacity .3s; opacity:0; letter-spacing:.05em; }
    #newBadge.show { transform:translate(-50%,-50%) scale(1); opacity:1; }

    /* Idle */
    #idle { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; background:var(--bg); transition:opacity .8s; }
    #idle.hidden { opacity:0; pointer-events:none; }
    .idle-sun { font-size:80px; animation:float 4s ease-in-out infinite; filter:drop-shadow(0 0 30px rgba(244,196,48,.5)); }
    @keyframes float { 0%,100% { transform:translateY(0) rotate(-3deg); } 50% { transform:translateY(-14px) rotate(3deg); } }
    .idle-title { font-family:'Cinzel',serif; font-size:3rem; font-weight:700; color:var(--gold); text-shadow:0 0 40px rgba(244,196,48,.5); letter-spacing:.1em; text-align:center; }
    .idle-flowers { font-size:1.5rem; letter-spacing:.3em; opacity:.7; }
    .idle-sub { font-size:1rem; color:var(--lavender); text-align:center; font-weight:300; letter-spacing:.05em; }

    /* ── RULETA ── */
    #roulette { position:fixed; inset:0; z-index:100; background:rgba(28,15,63,.97); display:none; flex-direction:column; align-items:center; justify-content:center; gap:32px; }
    #roulette.show { display:flex; }

    .roulette-title { font-family:'Cinzel',serif; font-size:2.5rem; color:var(--gold); text-shadow:0 0 40px rgba(244,196,48,.6); letter-spacing:.1em; text-align:center; }

    #rouletteFrame {
      width: min(70vh, 70vw);
      height: min(70vh, 70vw);
      border-radius: 20px;
      border: 3px solid rgba(244,196,48,.4);
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 60px rgba(244,196,48,.2);
    }
    #rouletteImg { width:100%; height:100%; object-fit:cover; transition: none; }

    .roulette-sub { font-size:1rem; color:var(--lavender); text-align:center; font-weight:300; }

    #winnerBanner {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(28,15,63,.95), transparent);
      padding: 24px;
      text-align: center;
      display: none;
    }
    #winnerBanner.show { display: block; animation: fadeIn .6s; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .winner-label { font-family:'Cinzel',serif; font-size:1.8rem; color:var(--gold); text-shadow:0 0 30px rgba(244,196,48,.7); }
    .winner-votes { font-size:1rem; color:var(--lavender); margin-top:6px; }

    .roulette-hint { position:fixed; bottom:20px; right:24px; font-size:.7rem; color:rgba(255,255,255,.2); z-index:11; }

    /* ── Indicador WS ── */
    #wsIndicator { position:fixed; top:12px; right:16px; z-index:200; display:flex; align-items:center; gap:6px; font-size:.65rem; color:rgba(255,255,255,.4); opacity:0; transition:opacity .4s; }
    #wsIndicator.show { opacity:1; }
    #wsDot { width:7px; height:7px; border-radius:50%; background:#ff5555; animation:blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>
<div class="lanterns">
  <div class="lantern ll1"></div><div class="lantern ll2"></div><div class="lantern ll3"></div>
  <div class="lantern ll4"></div><div class="lantern ll5"></div><div class="lantern ll6"></div>
  <div class="lantern ll7"></div>
</div>

<!-- Idle -->
<div id="idle">
  <div class="idle-sun">✨</div>
  <div class="idle-title">XV de Lola</div>
  <div class="idle-flowers">🌸 🌸 🌸</div>
  <div class="idle-sub">Escaneá el QR y enviá tu foto</div>
</div>

<!-- Foto -->
<div id="photoWrap"><img id="photoImg" src="" alt="" /></div>
<div id="vignette"></div>

<!-- Top -->
<div id="topBar">
  <div>
    <div class="event-name">✦ XV de Lola ✦</div>
    <div class="event-sub">Fotos del festejo</div>
  </div>
  <div id="photoCount">
    <div class="label">Fotos</div>
    <span id="countNum">0</span>
  </div>
</div>

<!-- Bottom -->
<div id="bottomBar">
  <div class="qr-hint">
    <div class="qr-icon">📷</div>
    <div class="qr-text">
      <strong>¡Sumate!</strong>Escaneá el QR y enviá tu foto
    </div>
  </div>
  <div id="voteBar">
    <div class="vote-pill">❤️ <span class="cnt" id="v-heart">0</span></div>
    <div class="vote-pill">🔥 <span class="cnt" id="v-fire">0</span></div>
    <div class="vote-pill">😂 <span class="cnt" id="v-laugh">0</span></div>
    <div class="vote-pill">😮 <span class="cnt" id="v-wow">0</span></div>
  </div>
</div>

<div id="timerBar"><div id="timerFill" style="width:100%"></div></div>
<div id="newBadge">🏮 Nueva foto</div>

<!-- Ruleta -->
<div id="roulette">
  <div class="roulette-title">✨ Foto Ganadora ✨</div>
  <div id="rouletteFrame">
    <img id="rouletteImg" src="" alt="" />
    <div id="winnerBanner">
      <div class="winner-label" id="winnerLabel">🏆 ¡La elegida!</div>
      <div class="winner-votes" id="winnerVotes"></div>
    </div>
  </div>
  <div class="roulette-sub" id="rouletteSub">Girando...</div>
</div>

<div id="wsIndicator"><div id="wsDot"></div> Reconectando...</div>
<div class="roulette-hint">F = Fullscreen · ESC = Cerrar ruleta</div>

<script>
  const API_BASE  = window.location.origin;
  const WS_URL    = API_BASE.replace(/^http/, 'ws') + '/ws/screen';

  // ── Audio ─────────────────────────────────────────────────────────────────
  const AC = new (window.AudioContext || window.webkitAudioContext)();

  function playTone(freqs, dur, type = 'sine', vol = 0.18) {
    freqs.forEach(({ f, t = 0, d = dur }) => {
      const o = AC.createOscillator();
      const g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = type;
      o.frequency.setValueAtTime(f, AC.currentTime + t);
      g.gain.setValueAtTime(0, AC.currentTime + t);
      g.gain.linearRampToValueAtTime(vol, AC.currentTime + t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + t + d);
      o.start(AC.currentTime + t);
      o.stop(AC.currentTime + t + d + 0.05);
    });
  }

  function playNoise(dur = 0.12, vol = 0.08) {
    const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource();
    const g   = AC.createGain();
    const flt = AC.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 1200; flt.Q.value = 0.8;
    src.buffer = buf;
    src.connect(flt); flt.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    src.start(); src.stop(AC.currentTime + dur + 0.05);
  }

  const EMOJI_SOUNDS = {
    '❤️': () => playTone([{ f:523 }, { f:659, t:.08 }, { f:784, t:.16 }], .22, 'sine', .14),
    '🔥': () => { playNoise(.18, .12); playTone([{ f:180, t:.02 }], .18, 'sawtooth', .07); },
    '😂': () => playTone([
      { f:600,t:0,d:.07 },{ f:700,t:.08,d:.07 },{ f:600,t:.16,d:.07 },
      { f:700,t:.24,d:.07 },{ f:800,t:.32,d:.09 }
    ], .09, 'sine', .13),
    '😮': () => playTone([{ f:880, t:0 }, { f:660, t:.15 }], .28, 'sine', .13),
  };

  function playEmojiSound(emoji) {
    if (AC.state === 'suspended') AC.resume();
    EMOJI_SOUNDS[emoji]?.();
  }

  let rouletteTickInterval = null;
  function playRouletteTick(fast = true) {
    if (AC.state === 'suspended') AC.resume();
    playTone([{ f: fast ? 1200 : 800 }], fast ? 0.04 : 0.07, 'square', 0.08);
  }

  function playRouletteWin() {
    if (AC.state === 'suspended') AC.resume();
    // Fanfarria: Do Mi Sol Do (ascendente)
    playTone([
      { f:523, t:0,   d:.18 },
      { f:659, t:.18, d:.18 },
      { f:784, t:.36, d:.18 },
      { f:1047,t:.54, d:.5  },
    ], .18, 'sine', .2);
    // Acorde de fondo
    playTone([
      { f:262, t:.54, d:.5 },
      { f:330, t:.54, d:.5 },
      { f:392, t:.54, d:.5 },
    ], .5, 'triangle', .08);
  }
  const DISPLAY_MS = 8000;
  const POLL_MS    = 5000;

  const queue    = [];
  const history  = [];   // fotos ya mostradas
  let showing      = false;
  let totalCount   = 0;
  let wsReady      = false;
  let timerTO      = null;
  let currentPhoto = null;
  let ws           = null;
  let rouletteRunning = false;  // evita doble disparo
  const knownIds = new Set();

  // Contadores de votos de la foto actual
  const voteCounts = { '❤️': 0, '🔥': 0, '😂': 0, '😮': 0 };

  function connectWS() {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => {
      wsReady = true;
      document.getElementById('wsIndicator').classList.remove('show');
    };
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'init')           msg.photos.forEach(p => enqueue(p));
      else if (msg.type === 'new_photo') { enqueue(msg.photo); flashBadge(); }
      else if (msg.type === 'vote')         handleVote(msg);
      else if (msg.type === 'start_roulette') startRoulette();
      else if (msg.type === 'skip_photo')    skipPhoto();
    };
    ws.onclose = () => {
      wsReady = false;
      document.getElementById('wsIndicator').classList.add('show');
      setTimeout(connectWS, 3000);
    };
    ws.onerror = () => ws.close();
    setInterval(() => { if (ws && ws.readyState === 1) ws.send('ping'); }, 20000);
  }

  async function pollQueue() {
    try {
      const data = await fetch(`${API_BASE}/queue`).then(r => r.json());
      data.photos.forEach(p => enqueue(p));
    } catch (_) {}
  }
  setTimeout(() => { if (!wsReady) { pollQueue(); setInterval(pollQueue, POLL_MS); } }, 5000);

  function enqueue(photo) {
    if (knownIds.has(photo.id)) return;
    knownIds.add(photo.id);
    queue.push(photo);
    totalCount++;
    document.getElementById('countNum').textContent = totalCount;
    if (!showing) showNext();
  }

  function showNext() {
    if (!queue.length) { showing = false; return; }
    showing = true;
    displayPhoto(queue.shift());
  }

  function skipPhoto() {
    if (timerTO) { clearTimeout(timerTO); timerTO = null; }
    if (queue.length > 0) {
      // Hay fotos pendientes → siguiente
      showing = true;
      displayPhoto(queue.shift());
    } else if (history.length > 1) {
      // No hay pendientes → volver a la anterior
      const prev = history[history.length - 2];
      displayPhoto(prev);
    } else {
      // Nada que mostrar
      showing = false;
      currentPhoto = null;
      document.getElementById('idle').classList.remove('hidden');
      document.getElementById('photoImg').classList.remove('visible');
      document.getElementById('vignette').classList.remove('visible');
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'now_showing', photo: null }));
    }
  }

  function displayPhoto(photo) {
    const img      = document.getElementById('photoImg');
    const vignette = document.getElementById('vignette');
    const fill     = document.getElementById('timerFill');

    document.getElementById('idle').classList.add('hidden');
    img.classList.remove('visible');
    vignette.classList.remove('visible');

    // Resetear contadores de votos
    Object.keys(voteCounts).forEach(k => voteCounts[k] = 0);
    updateVoteDisplay();

    const tmp = new Image();
    tmp.onload = () => {
      // Liberar referencia anterior para ayudar al GC del navegador
      img.src = '';
      img.src = API_BASE + photo.url;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        img.classList.add('visible');
        vignette.classList.add('visible');
      }));
    };
    tmp.onerror = () => setTimeout(showNext, 800);
    tmp.src = API_BASE + photo.url;

    // Guardar en historial (evitar duplicados consecutivos)
    if (!history.length || history[history.length - 1].id !== photo.id) {
      history.push(photo);
    }

    // Avisar al backend qué foto se está mostrando
    currentPhoto = photo;
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'now_showing', photo }));
    }

    if (timerTO) clearTimeout(timerTO);
    fill.style.transition = 'none';
    fill.style.width = '100%';
    requestAnimationFrame(() => {
      fill.style.transition = `width ${DISPLAY_MS}ms linear`;
      fill.style.width = '0%';
    });
    timerTO = setTimeout(showNext, DISPLAY_MS);
  }

  // ── Votos ────────────────────────────────────────────────────────────────
  function handleVote(msg) {
    if (!currentPhoto || msg.photo_id !== currentPhoto.id) return;
    const counts = msg.counts || {};
    Object.keys(counts).forEach(k => { voteCounts[k] = counts[k]; });
    updateVoteDisplay();
    spawnFloatingEmoji(msg.emoji);
    playEmojiSound(msg.emoji);
  }

  function updateVoteDisplay() {
    document.getElementById('v-heart').textContent = voteCounts['❤️'] || 0;
    document.getElementById('v-fire').textContent  = voteCounts['🔥'] || 0;
    document.getElementById('v-laugh').textContent = voteCounts['😂'] || 0;
    document.getElementById('v-wow').textContent   = voteCounts['😮'] || 0;
  }

  function spawnFloatingEmoji(emoji) {
    const el = document.createElement('div');
    el.className = 'float-emoji';
    el.textContent = emoji;
    el.style.left  = (20 + Math.random() * 60) + 'vw';
    el.style.bottom = '120px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2100);
  }

  // ── Ruleta ───────────────────────────────────────────────────────────────
  async function startRoulette() {
    if (rouletteRunning) return;
    rouletteRunning = true;
    const overlay = document.getElementById('roulette');
    overlay.classList.add('show');
    document.getElementById('winnerBanner').classList.remove('show');
    document.getElementById('rouletteSub').textContent = 'Cargando fotos...';

    let photos = [];
    try {
      const data = await fetch(`${API_BASE}/votes`).then(r => r.json());
      photos = data.photos.filter(p => p.total_votes > 0);
      if (!photos.length) {
        // Si no hay votos, usar todas las fotos
        const q = await fetch(`${API_BASE}/queue`).then(r => r.json());
        photos = q.photos;
      }
    } catch (_) {}

    if (!photos.length) {
      document.getElementById('rouletteSub').textContent = 'Todavía no hay fotos 📷';
      setTimeout(() => { closeRoulette(); rouletteRunning = false; }, 2500);
      return;
    }

    // Girar: cambiar foto rápido por 4 segundos, luego frenar
    const img    = document.getElementById('rouletteImg');
    const winner = photos[Math.floor(Math.random() * photos.length)]; // al azar
    let   idx    = 0;
    const allUrls = photos.map(p => API_BASE + p.url);
    let   interval = 80;
    let   elapsed  = 0;
    document.getElementById('rouletteSub').textContent = '✨ Girando...';

    const spin = setInterval(() => {
      img.src = allUrls[idx % allUrls.length];
      idx++;
      elapsed += interval;

      // Tick con tono más lento al frenar
      playRouletteTick(elapsed < 3000);

      // Frenar progresivamente
      if (elapsed > 3000) interval = 300;
      else if (elapsed > 2000) interval = 180;
      else if (elapsed > 1200) interval = 120;

      if (elapsed > 4500) {
        clearInterval(spin);
        // Mostrar ganadora
        img.src = API_BASE + winner.url;
        document.getElementById('rouletteSub').textContent = '';
        document.getElementById('winnerVotes').textContent = '';
        document.getElementById('winnerBanner').classList.add('show');
        playRouletteWin();
      }
    }, interval);
  }

  function closeRoulette() {
    document.getElementById('roulette').classList.remove('show');
    rouletteRunning = false;
  }

  // ── Teclado ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape')             closeRoulette();
    if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.().catch(() => {});
  });

  document.addEventListener('click', () => {
    document.documentElement.requestFullscreen?.().catch(() => {});
  });

  function flashBadge() {
    const b = document.getElementById('newBadge');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 2200);
  }

  connectWS();
</script>
</body>
</html>
