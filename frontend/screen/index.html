<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XV de Lola</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:    #F4C430;
      --gold2:   #E8A020;
      --gold3:   #FDE68A;
      --purple:  #7B5EA7;
      --lav:     #B39DDB;
      --bg:      #080514;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Cormorant Garamond', serif;
      color: #fff;
      cursor: none;
    }

    /* ── Canvas base (estrellas + linternas) ── */
    #canvas-bg {
      position: fixed; inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Fondo dinámico: dos capas para crossfade ── */
    .bg-layer {
      position: fixed; inset: -40px;
      z-index: 2;
      background-size: cover;
      background-position: center;
      filter: blur(70px) brightness(.28) saturate(2);
      transform: scale(1.05);
      opacity: 0;
      transition: opacity 2s ease;
      pointer-events: none;
    }
    .bg-layer.active { opacity: 1; }

    /* ── IDLE ── */
    #idle {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      transition: opacity 1.4s ease;
    }
    #idle.out { opacity: 0; pointer-events: none; }

    #corona-wrap {
      position: relative;
      width: clamp(160px, 22vw, 280px);
      height: clamp(160px, 22vw, 280px);
      margin-bottom: clamp(24px, 4vh, 44px);
      display: flex; align-items: center; justify-content: center;
    }
    #corona-svg {
      width: 100%; height: 100%;
      animation: coronaSpin 80s linear infinite;
      filter: drop-shadow(0 0 clamp(20px,3vw,50px) rgba(244,196,48,.5));
    }
    @keyframes coronaSpin { to { transform: rotate(360deg); } }

    #corona-glow {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244,196,48,.18) 0%, transparent 70%);
      animation: glowPulse 4s ease-in-out infinite alternate;
    }
    @keyframes glowPulse { from { transform: scale(.9); opacity: .6; } to { transform: scale(1.2); opacity: 1; } }

    .idle-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(3rem, 7.5vw, 7.5rem);
      font-weight: 700;
      letter-spacing: .1em;
      text-align: center;
      line-height: 1;
      background: linear-gradient(135deg, #FDE68A 0%, #F4C430 35%, #FFB020 65%, #FDE68A 100%);
      background-size: 250% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: titleShimmer 5s linear infinite;
      filter: drop-shadow(0 0 clamp(20px,3vw,50px) rgba(244,196,48,.3));
    }
    @keyframes titleShimmer { to { background-position: 250% center; } }

    .idle-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 2.2vw, 2rem);
      color: rgba(179,157,219,.75);
      letter-spacing: .4em;
      text-transform: uppercase;
      margin-top: clamp(12px, 2vh, 20px);
      font-weight: 400;
    }

    .idle-phrase {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(.9rem, 1.8vw, 1.6rem);
      color: rgba(253,230,138,.5);
      letter-spacing: .12em;
      margin-top: clamp(16px, 2.5vh, 28px);
    }

    /* ── FOTO ── */
    #photo-stage {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #photo-stage.active {
      opacity: 1;
      pointer-events: auto;
    }

    #photo-frame {
      position: relative;
      max-width: 88vw;
      max-height: 88vh;
      overflow: hidden;
      border-radius: 3px;
      box-shadow:
        0 0 0 1px rgba(244,196,48,.18),
        0 0 60px rgba(0,0,0,.9),
        0 0 120px rgba(0,0,0,.6);
    }
    #photoImg {
      display: block;
      max-width: 88vw;
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      transform-origin: center center;
      will-change: transform;
    }
    #photoImg.ken-a { animation: kenA var(--display-dur, 8s) ease-in-out forwards; }
    #photoImg.ken-b { animation: kenB var(--display-dur, 8s) ease-in-out forwards; }
    #photoImg.ken-c { animation: kenC var(--display-dur, 8s) ease-in-out forwards; }
    @keyframes kenA { from { transform: scale(1)    translate(0,0);     } to { transform: scale(1.07) translate(-1.5%, -1%); } }
    @keyframes kenB { from { transform: scale(1.06) translate(1.5%, 1%); } to { transform: scale(1)    translate(0, 0);       } }
    @keyframes kenC { from { transform: scale(1)    translate(1%, -1%);  } to { transform: scale(1.06) translate(-1%, 1%);    } }

    /* Viñeta sobre la foto */
    #photo-vignette {
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(8,5,20,.5) 0%, transparent 18%, transparent 80%, rgba(8,5,20,.6) 100%),
        radial-gradient(ellipse 120% 120% at 50% 50%, transparent 50%, rgba(8,5,20,.5) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Destello de entrada */
    #burst {
      position: fixed; inset: 0; z-index: 20;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(244,196,48,.22) 0%, transparent 70%);
    }
    #burst.flash { animation: burstFlash .7s ease-out forwards; }
    @keyframes burstFlash {
      0%   { opacity: 1; transform: scale(.5); }
      60%  { opacity: .6; }
      100% { opacity: 0; transform: scale(2); }
    }

    /* ── TOP BAR ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 30;
      padding: clamp(16px,3vh,32px) clamp(24px,4vw,52px);
      background: linear-gradient(to bottom, rgba(8,5,20,.7) 0%, transparent 100%);
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none;
    }
    .ev-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(.85rem, 1.6vw, 1.5rem);
      font-weight: 600;
      color: rgba(253,230,138,.8);
      letter-spacing: .18em;
      text-shadow: 0 0 30px rgba(244,196,48,.35);
    }
    .ev-ornament { opacity: .5; }
    #photoCount {
      text-align: right;
    }
    .count-label {
      font-family: 'Cinzel', serif;
      font-size: clamp(.55rem, .9vw, .75rem);
      color: rgba(179,157,219,.45);
      text-transform: uppercase;
      letter-spacing: .18em;
      display: block;
    }
    .count-num {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 3.2vw, 3rem);
      font-weight: 700;
      color: rgba(255,255,255,.65);
      line-height: 1;
      display: block;
    }

    /* ── TIMER ── */
    #timerBar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; z-index: 30;
      background: rgba(255,255,255,.05);
    }
    #timerFill {
      height: 100%;
      background: linear-gradient(90deg, rgba(123,94,167,.6), rgba(244,196,48,.9));
      box-shadow: 0 0 10px rgba(244,196,48,.7);
    }

    /* ── BADGE ── */
    #newBadge {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      z-index: 40;
      pointer-events: none;
      font-family: 'Cinzel', serif;
      font-size: clamp(.85rem, 1.4vw, 1.1rem);
      letter-spacing: .1em;
      color: var(--gold3);
      background: rgba(8,5,20,.85);
      border: 1px solid rgba(244,196,48,.3);
      backdrop-filter: blur(16px);
      padding: clamp(10px,1.5vh,16px) clamp(24px,3vw,40px);
      border-radius: 99px;
      opacity: 0;
      transition: transform .5s cubic-bezier(.175,.885,.32,1.275), opacity .3s;
      box-shadow: 0 0 40px rgba(244,196,48,.15), inset 0 0 20px rgba(244,196,48,.05);
    }
    #newBadge.show {
      transform: translate(-50%,-50%) scale(1);
      opacity: 1;
    }

    /* ── RULETA ── */
    #roulette {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(4,2,12,.98);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vh, 36px);
    }
    #roulette.show { display: flex; }

    .rul-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 3.5vw, 3.2rem);
      letter-spacing: .14em;
      text-align: center;
      background: linear-gradient(135deg, #FDE68A, #F4C430, #E8A020);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 30px rgba(244,196,48,.45));
    }

    #rouletteFrame {
      width: min(66vh, 66vw);
      height: min(66vh, 66vw);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(244,196,48,.2),
        0 0 80px rgba(244,196,48,.12),
        0 40px 100px rgba(0,0,0,.9);
    }
    #rouletteImg { width: 100%; height: 100%; object-fit: cover; }

    .rul-sub {
      font-family: 'Cinzel', serif;
      font-size: clamp(.8rem, 1.4vw, 1.1rem);
      color: rgba(179,157,219,.7);
      letter-spacing: .1em;
      text-align: center;
    }

    #winnerBanner {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: clamp(20px,4vh,40px) 20px clamp(14px,2vh,24px);
      background: linear-gradient(to top, rgba(4,2,12,.98) 0%, rgba(4,2,12,.7) 55%, transparent 100%);
      text-align: center;
      display: none;
    }
    #winnerBanner.show { display: block; animation: winnerIn .9s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes winnerIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

    .winner-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 2.8vw, 2.2rem);
      letter-spacing: .1em;
      color: var(--gold3);
      filter: drop-shadow(0 0 20px rgba(244,196,48,.7));
    }

    /* ── WS dot ── */
    #wsIndicator {
      position: fixed; bottom: 10px; left: 18px; z-index: 50;
      display: flex; align-items: center; gap: 6px;
      font-family: 'Cinzel', serif;
      font-size: .6rem; color: rgba(255,255,255,.3);
      letter-spacing: .06em;
      opacity: 0; transition: opacity .4s;
    }
    #wsIndicator.show { opacity: 1; }
    #wsDot { width: 5px; height: 5px; border-radius: 50%; background: #f55; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.15;} }
  </style>
</head>
<body>

<!-- Canvas partículas -->
<canvas id="canvas-bg"></canvas>

<!-- Fondo dinámico (crossfade entre dos capas) -->
<div id="bg-a" class="bg-layer"></div>
<div id="bg-b" class="bg-layer"></div>

<!-- IDLE -->
<div id="idle">
  <div id="corona-wrap">
    <div id="corona-glow"></div>
    <svg id="corona-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Rayos largos x8 -->
      <g fill="#F4C430">
        <polygon points="100,100 96,52 104,52"/>
        <polygon points="100,100 96,148 104,148"/>
        <polygon points="100,100 52,96 52,104"/>
        <polygon points="100,100 148,96 148,104"/>
        <polygon points="100,100 67.4,67.4 73.1,61.7"/>
        <polygon points="100,100 132.6,132.6 126.9,138.3"/>
        <polygon points="100,100 132.6,67.4 138.3,73.1"/>
        <polygon points="100,100 67.4,132.6 61.7,126.9"/>
      </g>
      <!-- Rayos medios x8 -->
      <g fill="#FDE68A" opacity=".65">
        <polygon points="100,100 97.5,68 102.5,68"/>
        <polygon points="100,100 97.5,132 102.5,132"/>
        <polygon points="100,100 68,97.5 68,102.5"/>
        <polygon points="100,100 132,97.5 132,102.5"/>
        <polygon points="100,100 76.2,76.2 80.5,71.9"/>
        <polygon points="100,100 123.8,123.8 119.5,128.1"/>
        <polygon points="100,100 123.8,76.2 128.1,80.5"/>
        <polygon points="100,100 76.2,123.8 71.9,119.5"/>
      </g>
      <!-- Círculos -->
      <circle cx="100" cy="100" r="20" fill="#F4C430" opacity=".9"/>
      <circle cx="100" cy="100" r="13" fill="#FFE580"/>
      <circle cx="100" cy="100" r="6"  fill="#FFF9C4"/>
    </svg>
  </div>

  <div class="idle-title">XV de Lola</div>
  <div class="idle-name">Una noche especial</div>
  <div class="idle-phrase">Al fin veo la luz...</div>
</div>

<!-- FOTO -->
<div id="photo-stage">
  <div id="photo-frame">
    <img id="photoImg" src="" alt="" />
    <div id="photo-vignette"></div>
  </div>
</div>

<!-- Destello entrada -->
<div id="burst"></div>

<!-- Top bar -->
<div id="topBar">
  <div class="ev-name">
    <span class="ev-ornament">✦ </span>XV de Lola<span class="ev-ornament"> ✦</span>
  </div>
  <div id="photoCount">
    <span class="count-label">Fotos</span>
    <span class="count-num" id="countNum">0</span>
  </div>
</div>

<div id="timerBar"><div id="timerFill" style="width:100%"></div></div>
<div id="newBadge">🏮 &nbsp;Nueva foto</div>

<!-- RULETA -->
<div id="roulette">
  <div class="rul-title">✨ La Foto Elegida ✨</div>
  <div id="rouletteFrame">
    <img id="rouletteImg" src="" alt="" />
    <div id="winnerBanner">
      <div class="winner-label">🏆 &nbsp;¡La elegida!</div>
    </div>
  </div>
  <div class="rul-sub" id="rouletteSub">Girando...</div>
</div>

<div id="wsIndicator"><div id="wsDot"></div>&nbsp;Reconectando</div>

<script>
const API_BASE = window.location.origin;
const WS_URL   = API_BASE.replace(/^http/, 'ws') + '/ws/screen';

// ── Canvas: estrellas + linternas ─────────────────────────────────────────
(function FX() {
  const cv  = document.getElementById('canvas-bg');
  const ctx = cv.getContext('2d');

  let W, H, stars = [], lanterns = [];

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
    stars    = initStars();
    lanterns = initLanterns();
  }

  function initStars() {
    return Array.from({ length: 220 }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.3 + .2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * .007 + .002,
      color: Math.random() > .6
        ? `rgba(253,230,138,`
        : Math.random() > .5
          ? `rgba(232,160,180,`
          : `rgba(179,157,219,`,
    }));
  }

  function initLanterns() {
    return Array.from({ length: 18 }, () => newLantern());
  }

  function newLantern() {
    const colors = [
      ['#FFE566','#F4C430'],
      ['#F9C3D8','#E8A0B4'],
      ['#C9B8F0','#9B7FC7'],
    ];
    const c = colors[Math.floor(Math.random() * colors.length)];
    return {
      x:   Math.random() * W,
      y:   H + 60 + Math.random() * 120,
      w:   16 + Math.random() * 22,
      vx:  (Math.random() - .5) * .35,
      vy:  -.55 - Math.random() * .55,
      a:   0,
      maxA: .55 + Math.random() * .35,
      c1: c[0], c2: c[1],
      sway: Math.random() * Math.PI * 2,
      swaySpeed: .008 + Math.random() * .006,
    };
  }

  function drawLantern(ln, t) {
    const sw = Math.sin(ln.sway + t * ln.swaySpeed) * 14;
    const x  = ln.x + sw;
    const y  = ln.y;
    const w  = ln.w, h = w * 1.35;

    ctx.save();
    ctx.globalAlpha = ln.a;

    // Glow
    const gl = ctx.createRadialGradient(x, y, 0, x, y, w * 2.2);
    gl.addColorStop(0, ln.c1 + '33');
    gl.addColorStop(1, 'transparent');
    ctx.fillStyle = gl;
    ctx.beginPath();
    ctx.ellipse(x, y, w * 2.2, w * 2.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cuerpo
    const bg = ctx.createLinearGradient(x - w / 2, y - h / 2, x + w / 2, y + h / 2);
    bg.addColorStop(0, ln.c1);
    bg.addColorStop(1, ln.c2);
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Brillo interior
    const hi = ctx.createRadialGradient(x - w * .15, y - h * .15, 0, x, y, w * .55);
    hi.addColorStop(0, 'rgba(255,255,255,.35)');
    hi.addColorStop(1, 'transparent');
    ctx.fillStyle = hi;
    ctx.beginPath();
    ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Hilo
    ctx.strokeStyle = 'rgba(255,255,255,.2)';
    ctx.lineWidth = .8;
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x, y + h / 2 + 10);
    ctx.stroke();

    ctx.restore();
  }

  let then = 0;
  function loop(ts) {
    const t = ts * .001;
    const dt = t - then; then = t;

    ctx.clearRect(0, 0, W, H);

    // Estrellas
    stars.forEach(s => {
      const a = .2 + .6 * Math.abs(Math.sin(s.phase + t * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color + a + ')';
      ctx.fill();
    });

    // Linternas
    lanterns.forEach((ln, i) => {
      ln.x  += ln.vx;
      ln.y  += ln.vy;
      ln.a   = Math.min(ln.maxA, ln.a + .003);

      if (ln.y < -100) lanterns[i] = newLantern();
      drawLantern(ln, t);
    });

    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);
})();

// ── Audio ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freqs, dur, type = 'sine', vol = 0.18) {
  freqs.forEach(({ f, t = 0, d = dur }) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type;
    o.frequency.setValueAtTime(f, AC.currentTime + t);
    g.gain.setValueAtTime(0, AC.currentTime + t);
    g.gain.linearRampToValueAtTime(vol, AC.currentTime + t + .01);
    g.gain.exponentialRampToValueAtTime(.001, AC.currentTime + t + d);
    o.start(AC.currentTime + t);
    o.stop(AC.currentTime + t + d + .05);
  });
}
function playRouletteTick(fast) {
  if (AC.state === 'suspended') AC.resume();
  playTone([{ f: fast ? 1100 : 750 }], fast ? .035 : .065, 'square', .07);
}
function playRouletteWin() {
  if (AC.state === 'suspended') AC.resume();
  playTone([
    { f:523,t:0,d:.18 }, { f:659,t:.18,d:.18 },
    { f:784,t:.36,d:.18 }, { f:1047,t:.54,d:.55 },
  ], .18, 'sine', .2);
  playTone([
    { f:262,t:.54,d:.55 }, { f:330,t:.54,d:.55 }, { f:392,t:.54,d:.55 },
  ], .55, 'triangle', .08);
}

// ── Estado ─────────────────────────────────────────────────────────────────
const DISPLAY_MS = 8000;
const KEN_BURNS  = ['ken-a', 'ken-b', 'ken-c'];

const queue  = [], history = [];
let showing      = false, totalCount    = 0;
let wsReady      = false, timerTO       = null;
let currentPhoto = null,  ws            = null;
let rouletteRunning = false, kenIdx     = 0;
const knownIds = new Set();

// Crossfade de fondo
let bgActive = 'a';
const bgA = document.getElementById('bg-a');
const bgB = document.getElementById('bg-b');

function setBgPhoto(url) {
  const next = bgActive === 'a' ? bgB : bgA;
  const prev = bgActive === 'a' ? bgA : bgB;
  next.style.backgroundImage = `url(${url})`;
  next.classList.add('active');
  setTimeout(() => prev.classList.remove('active'), 400);
  bgActive = bgActive === 'a' ? 'b' : 'a';
}
function clearBg() {
  bgA.classList.remove('active');
  bgB.classList.remove('active');
}

// ── WebSocket ───────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    wsReady = true;
    document.getElementById('wsIndicator').classList.remove('show');
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if      (msg.type === 'init')           msg.photos.forEach(p => enqueue(p));
    else if (msg.type === 'new_photo')      { enqueue(msg.photo); flashBadge(); }
    else if (msg.type === 'start_roulette') startRoulette();
    else if (msg.type === 'skip_photo')     skipPhoto();
  };
  ws.onclose = () => {
    wsReady = false;
    document.getElementById('wsIndicator').classList.add('show');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
  setInterval(() => { if (ws && ws.readyState === 1) ws.send('ping'); }, 20000);
}

async function pollQueue() {
  try {
    const d = await fetch(`${API_BASE}/queue`).then(r => r.json());
    d.photos.forEach(p => enqueue(p));
  } catch (_) {}
}
setTimeout(() => { if (!wsReady) { pollQueue(); setInterval(pollQueue, 5000); } }, 5000);

// ── Cola ────────────────────────────────────────────────────────────────────
function enqueue(photo) {
  if (knownIds.has(photo.id)) return;
  knownIds.add(photo.id);
  queue.push(photo);
  totalCount++;
  document.getElementById('countNum').textContent = totalCount;
  if (!showing) showNext();
}

function showNext() {
  if (!queue.length) { showing = false; return; }
  showing = true;
  displayPhoto(queue.shift());
}

function skipPhoto() {
  if (timerTO) { clearTimeout(timerTO); timerTO = null; }
  if (queue.length > 0) {
    showing = true; displayPhoto(queue.shift());
  } else if (history.length > 1) {
    displayPhoto(history[history.length - 2]);
  } else {
    showing = false; currentPhoto = null;
    const stage = document.getElementById('photo-stage');
    stage.classList.remove('active');
    clearBg();
    document.getElementById('idle').classList.remove('out');
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'now_showing', photo: null }));
  }
}

function displayPhoto(photo) {
  const img   = document.getElementById('photoImg');
  const stage = document.getElementById('photo-stage');
  const fill  = document.getElementById('timerFill');
  const idle  = document.getElementById('idle');

  // Ocultar idle
  idle.classList.add('out');

  // Quitar Ken Burns anterior, resetear
  img.classList.remove(...KEN_BURNS);
  img.style.cssText = `--display-dur: ${DISPLAY_MS}ms`;
  void img.offsetWidth;

  const tmp = new Image();
  tmp.onload = () => {
    img.src = '';
    img.src = API_BASE + photo.url;

    // Fondo dinámico
    setBgPhoto(API_BASE + photo.url);

    // Mostrar stage
    stage.classList.add('active');

    // Ken Burns (rotar entre variantes)
    img.classList.add(KEN_BURNS[kenIdx % 3]);
    kenIdx++;

    // Destello de entrada
    const burst = document.getElementById('burst');
    burst.classList.remove('flash');
    void burst.offsetWidth;
    burst.classList.add('flash');
  };
  tmp.onerror = () => setTimeout(showNext, 800);
  tmp.src = API_BASE + photo.url;

  if (!history.length || history[history.length - 1].id !== photo.id)
    history.push(photo);

  currentPhoto = photo;
  if (ws && ws.readyState === 1)
    ws.send(JSON.stringify({ type: 'now_showing', photo }));

  if (timerTO) clearTimeout(timerTO);
  fill.style.transition = 'none';
  fill.style.width = '100%';
  requestAnimationFrame(() => {
    fill.style.transition = `width ${DISPLAY_MS}ms linear`;
    fill.style.width = '0%';
  });
  timerTO = setTimeout(showNext, DISPLAY_MS);
}

// ── Ruleta ──────────────────────────────────────────────────────────────────
async function startRoulette() {
  if (rouletteRunning) return;
  rouletteRunning = true;

  const overlay = document.getElementById('roulette');
  overlay.classList.add('show');
  document.getElementById('winnerBanner').classList.remove('show');
  document.getElementById('rouletteSub').textContent = 'Cargando fotos...';

  let photos = [];
  try {
    const d = await fetch(`${API_BASE}/queue`).then(r => r.json());
    photos = d.photos;
  } catch (_) {}

  if (!photos.length) {
    document.getElementById('rouletteSub').textContent = 'Todavía no hay fotos 📷';
    setTimeout(() => { closeRoulette(); }, 2500);
    return;
  }

  const img     = document.getElementById('rouletteImg');
  const winner  = photos[Math.floor(Math.random() * photos.length)];
  const allUrls = photos.map(p => API_BASE + p.url);
  let idx = 0, interval = 80, elapsed = 0;

  document.getElementById('rouletteSub').textContent = '✨ Girando...';

  const spin = setInterval(() => {
    img.src = allUrls[idx % allUrls.length];
    idx++;
    elapsed += interval;

    playRouletteTick(elapsed < 3000);

    if      (elapsed > 3000) interval = 320;
    else if (elapsed > 2000) interval = 190;
    else if (elapsed > 1200) interval = 130;

    if (elapsed > 4800) {
      clearInterval(spin);
      img.src = API_BASE + winner.url;
      document.getElementById('rouletteSub').textContent = '';
      document.getElementById('winnerBanner').classList.add('show');
      playRouletteWin();
    }
  }, interval);
}

function closeRoulette() {
  document.getElementById('roulette').classList.remove('show');
  rouletteRunning = false;
}

// ── Teclado ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape')             closeRoulette();
  if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.().catch(() => {});
});
document.addEventListener('click', () => {
  document.documentElement.requestFullscreen?.().catch(() => {});
});

function flashBadge() {
  const b = document.getElementById('newBadge');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 2600);
}

connectWS();
</script>
