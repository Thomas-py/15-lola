<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XV de Lola</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple:   #7B5EA7;
      --lavender: #B39DDB;
      --gold:     #F4C430;
      --gold2:    #E8A020;
      --gold3:    #FDE68A;
      --pink:     #E8A0B4;
      --bg:       #0E0820;
      --bg2:      #1C0F3F;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Lato', sans-serif;
      color: #fff;
      cursor: none;
    }

    /* ── Fondo base ── */
    #bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%,   rgba(123,94,167,.45) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 85% 100%,  rgba(244,196,48,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 50%,   rgba(232,160,180,.08) 0%, transparent 60%),
        var(--bg);
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg)   brightness(1); }
      50%  { filter: hue-rotate(8deg)   brightness(1.05); }
      100% { filter: hue-rotate(-5deg)  brightness(.98); }
    }

    /* ── Estrellas (generadas por JS) ── */
    #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Linternas ── */
    .lanterns { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .lantern {
      position: absolute;
      border-radius: 45% 45% 50% 50%;
      opacity: 0;
      animation: lanternRise linear infinite;
      filter: blur(.5px);
    }
    .lantern::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 3px; height: 8px;
      background: rgba(255,255,255,.3);
      border-radius: 2px;
    }
    @keyframes lanternRise {
      0%   { transform: translateY(0)        translateX(0);   opacity: 0; }
      8%   { opacity: .85; }
      50%  { transform: translateY(-50vh)    translateX(20px); }
      92%  { opacity: .4; }
      100% { transform: translateY(-115vh)   translateX(-10px); opacity: 0; }
    }
    .l1  { width:30px;  height:40px;  background:linear-gradient(160deg,#FFE066,#F4C430); bottom:-50px; left:3%;   animation-duration:14s;  animation-delay:0s; }
    .l2  { width:22px;  height:29px;  background:linear-gradient(160deg,#F9A8C9,#E8A0B4); bottom:-50px; left:9%;   animation-duration:19s;  animation-delay:3s; }
    .l3  { width:36px;  height:48px;  background:linear-gradient(160deg,#FFE066,#F4C430); bottom:-50px; left:17%;  animation-duration:12s;  animation-delay:7s; }
    .l4  { width:20px;  height:27px;  background:linear-gradient(160deg,#C9B8F0,#B39DDB); bottom:-50px; left:26%;  animation-duration:17s;  animation-delay:1s; }
    .l5  { width:28px;  height:37px;  background:linear-gradient(160deg,#FFE066,#F4C430); bottom:-50px; left:34%;  animation-duration:11s;  animation-delay:5s; }
    .l6  { width:18px;  height:24px;  background:linear-gradient(160deg,#F9A8C9,#E8A0B4); bottom:-50px; left:43%;  animation-duration:20s;  animation-delay:9s; }
    .l7  { width:34px;  height:45px;  background:linear-gradient(160deg,#FFE066,#E8A020); bottom:-50px; left:52%;  animation-duration:13s;  animation-delay:2s; }
    .l8  { width:24px;  height:32px;  background:linear-gradient(160deg,#C9B8F0,#B39DDB); bottom:-50px; left:61%;  animation-duration:16s;  animation-delay:6s; }
    .l9  { width:26px;  height:35px;  background:linear-gradient(160deg,#FFE066,#F4C430); bottom:-50px; left:70%;  animation-duration:10s;  animation-delay:4s; }
    .l10 { width:19px;  height:26px;  background:linear-gradient(160deg,#F9A8C9,#E8A0B4); bottom:-50px; left:79%;  animation-duration:18s;  animation-delay:8s; }
    .l11 { width:32px;  height:43px;  background:linear-gradient(160deg,#FFE066,#F4C430); bottom:-50px; left:87%;  animation-duration:15s;  animation-delay:0s; }
    .l12 { width:21px;  height:28px;  background:linear-gradient(160deg,#C9B8F0,#B39DDB); bottom:-50px; left:94%;  animation-duration:21s;  animation-delay:11s; }

    /* ── IDLE ── */
    #idle {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      transition: opacity 1.2s ease;
    }
    #idle.hidden { opacity: 0; pointer-events: none; }

    .idle-crown {
      font-size: 5rem;
      line-height: 1;
      filter: drop-shadow(0 0 40px rgba(244,196,48,.7));
      animation: crownFloat 5s ease-in-out infinite;
      margin-bottom: 28px;
    }
    @keyframes crownFloat {
      0%,100% { transform: translateY(0)    rotate(-4deg) scale(1); }
      50%      { transform: translateY(-18px) rotate(4deg) scale(1.06); }
    }

    .idle-title {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 700;
      color: transparent;
      background: linear-gradient(135deg, #FDE68A 0%, #F4C430 40%, #E8A020 70%, #FDE68A 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: none;
      letter-spacing: .12em;
      text-align: center;
      line-height: 1.1;
      animation: shimmer 4s linear infinite;
      filter: drop-shadow(0 0 60px rgba(244,196,48,.35));
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .idle-subtitle {
      font-family: 'Cinzel', serif;
      font-size: clamp(.9rem, 2vw, 1.4rem);
      color: rgba(179,157,219,.8);
      letter-spacing: .35em;
      text-transform: uppercase;
      margin-top: 16px;
      font-weight: 400;
    }

    .idle-divider {
      display: flex; align-items: center; gap: 18px;
      margin-top: 32px; margin-bottom: 0;
      color: var(--gold); font-size: 1.2rem;
      opacity: .6;
    }
    .idle-divider::before,
    .idle-divider::after {
      content: '';
      width: min(180px, 20vw); height: 1px;
      background: linear-gradient(90deg, transparent, rgba(244,196,48,.5), transparent);
    }

    /* ── FOTO ── */
    #photoWrap {
      position: fixed; inset: 0; z-index: 3;
      display: flex; align-items: center; justify-content: center;
    }
    #photoImg {
      max-width: 92vw; max-height: 92vh;
      object-fit: contain;
      opacity: 0;
      transition: opacity 1s ease;
      border-radius: 4px;
      filter: drop-shadow(0 8px 60px rgba(0,0,0,.8)) drop-shadow(0 0 2px rgba(244,196,48,.15));
    }
    #photoImg.visible { opacity: 1; }

    /* Viñeta */
    #vignette {
      position: fixed; inset: 0; z-index: 4;
      background:
        radial-gradient(ellipse 110% 110% at 50% 50%, transparent 55%, rgba(14,8,32,.75) 100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s;
    }
    #vignette.visible { opacity: 1; }

    /* ── TOP BAR ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 28px 44px 60px;
      background: linear-gradient(to bottom, rgba(14,8,32,.82) 0%, transparent 100%);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .event-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 600;
      color: var(--gold3);
      letter-spacing: .15em;
      text-shadow: 0 0 30px rgba(244,196,48,.4);
    }
    .event-name .ornament { opacity: .6; }

    #photoCount {
      text-align: right;
      display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    }
    .count-label {
      font-size: .65rem;
      color: rgba(179,157,219,.5);
      text-transform: uppercase;
      letter-spacing: .15em;
    }
    .count-num {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.8rem);
      font-weight: 700;
      color: rgba(255,255,255,.75);
      line-height: 1;
    }

    /* ── BOTTOM: VOTOS ── */
    #bottomBar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      padding: 60px 44px 20px;
      background: linear-gradient(to top, rgba(14,8,32,.8) 0%, transparent 100%);
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
    #voteBar {
      display: flex; gap: 20px; align-items: center;
    }
    .vote-pill {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 12px 22px;
      min-width: 70px;
      transition: transform .2s, background .3s, border-color .3s, box-shadow .3s;
    }
    .vote-pill.pulse {
      animation: votePulse .45s ease-out;
    }
    @keyframes votePulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .vote-emoji { font-size: 1.8rem; line-height: 1; }
    .vote-cnt {
      font-family: 'Cinzel', serif;
      font-size: .9rem;
      font-weight: 700;
      color: rgba(255,255,255,.85);
      min-width: 1ch;
      text-align: center;
    }

    /* ── Emojis flotantes ── */
    .float-emoji {
      position: fixed; z-index: 50;
      font-size: 3rem;
      pointer-events: none;
      animation: floatUp 2.4s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)    scale(1);   opacity: 1; }
      30%  { transform: translateY(-80px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-260px) scale(.8); opacity: 0; }
    }

    /* ── Timer ── */
    #timerBar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px; z-index: 12;
    }
    #timerFill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), #9B7FC7, var(--gold));
      box-shadow: 0 0 8px rgba(244,196,48,.6);
    }

    /* ── Badge nueva foto ── */
    #newBadge {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0) rotate(-6deg);
      background: linear-gradient(135deg, rgba(123,94,167,.9), rgba(28,15,63,.95));
      border: 1px solid rgba(244,196,48,.4);
      color: var(--gold3);
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 99px;
      z-index: 40;
      pointer-events: none;
      transition: transform .4s cubic-bezier(.175,.885,.32,1.275), opacity .3s;
      opacity: 0;
      letter-spacing: .08em;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(244,196,48,.2);
    }
    #newBadge.show {
      transform: translate(-50%,-50%) scale(1) rotate(0deg);
      opacity: 1;
    }

    /* ── RULETA ── */
    #roulette {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(8,4,20,.97);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    #roulette.show { display: flex; }

    .roulette-title {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 3rem);
      color: transparent;
      background: linear-gradient(135deg, #FDE68A, #F4C430, #E8A020);
      -webkit-background-clip: text;
      background-clip: text;
      letter-spacing: .12em;
      text-align: center;
      filter: drop-shadow(0 0 30px rgba(244,196,48,.5));
    }

    #rouletteFrame {
      width: min(68vh, 68vw);
      height: min(68vh, 68vw);
      border-radius: 16px;
      border: 2px solid rgba(244,196,48,.35);
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(244,196,48,.1),
        0 0 80px rgba(244,196,48,.15),
        0 30px 80px rgba(0,0,0,.8);
    }
    #rouletteImg { width:100%; height:100%; object-fit:cover; }

    .roulette-sub {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--lavender);
      text-align: center;
      letter-spacing: .08em;
    }

    #winnerBanner {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(8,4,20,.97) 0%, rgba(8,4,20,.6) 60%, transparent 100%);
      padding: 32px 24px 24px;
      text-align: center;
      display: none;
    }
    #winnerBanner.show { display: block; animation: fadeIn .8s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .winner-label {
      font-family: 'Cinzel Decorative', 'Cinzel', serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--gold3);
      filter: drop-shadow(0 0 20px rgba(244,196,48,.7));
      letter-spacing: .08em;
    }

    /* ── WS Indicador ── */
    #wsIndicator {
      position: fixed; bottom: 14px; left: 20px;
      z-index: 200;
      display: flex; align-items: center; gap: 6px;
      font-size: .65rem;
      color: rgba(255,255,255,.35);
      opacity: 0;
      transition: opacity .4s;
    }
    #wsIndicator.show { opacity: 1; }
    #wsDot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ff5555;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }
  </style>
</head>
<body>

<div id="bg-gradient"></div>
<canvas id="stars"></canvas>

<div class="lanterns">
  <div class="lantern l1"></div><div class="lantern l2"></div><div class="lantern l3"></div>
  <div class="lantern l4"></div><div class="lantern l5"></div><div class="lantern l6"></div>
  <div class="lantern l7"></div><div class="lantern l8"></div><div class="lantern l9"></div>
  <div class="lantern l10"></div><div class="lantern l11"></div><div class="lantern l12"></div>
</div>

<!-- Idle -->
<div id="idle">
  <div class="idle-crown">👑</div>
  <div class="idle-title">XV de Lola</div>
  <div class="idle-subtitle">Una noche para recordar</div>
  <div class="idle-divider">✦</div>
</div>

<!-- Foto -->
<div id="photoWrap"><img id="photoImg" src="" alt="" /></div>
<div id="vignette"></div>

<!-- Top bar -->
<div id="topBar">
  <div class="event-name">
    <span class="ornament">✦ </span>XV de Lola<span class="ornament"> ✦</span>
  </div>
  <div id="photoCount">
    <div class="count-label">Fotos</div>
    <div class="count-num" id="countNum">0</div>
  </div>
</div>

<!-- Bottom bar: votos -->
<div id="bottomBar">
  <div id="voteBar">
    <div class="vote-pill" id="pill-heart">
      <div class="vote-emoji">❤️</div>
      <div class="vote-cnt" id="v-heart">0</div>
    </div>
    <div class="vote-pill" id="pill-fire">
      <div class="vote-emoji">🔥</div>
      <div class="vote-cnt" id="v-fire">0</div>
    </div>
    <div class="vote-pill" id="pill-laugh">
      <div class="vote-emoji">😂</div>
      <div class="vote-cnt" id="v-laugh">0</div>
    </div>
    <div class="vote-pill" id="pill-wow">
      <div class="vote-emoji">😮</div>
      <div class="vote-cnt" id="v-wow">0</div>
    </div>
  </div>
</div>

<div id="timerBar"><div id="timerFill" style="width:100%"></div></div>
<div id="newBadge">🏮 &nbsp;Nueva foto</div>

<!-- Ruleta -->
<div id="roulette">
  <div class="roulette-title">✨ La Foto Elegida ✨</div>
  <div id="rouletteFrame">
    <img id="rouletteImg" src="" alt="" />
    <div id="winnerBanner">
      <div class="winner-label" id="winnerLabel">🏆 &nbsp;¡La elegida!</div>
    </div>
  </div>
  <div class="roulette-sub" id="rouletteSub">Girando...</div>
</div>

<div id="wsIndicator"><div id="wsDot"></div> Reconectando...</div>

<script>
  const API_BASE  = window.location.origin;
  const WS_URL    = API_BASE.replace(/^http/, 'ws') + '/ws/screen';

  // ── Estrellas ────────────────────────────────────────────────────────────
  (function initStars() {
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');
    let stars    = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + .2,
        a: Math.random(),
        speed: Math.random() * .008 + .003,
        phase: Math.random() * Math.PI * 2,
      }));
    }

    function draw(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a = .3 + .5 * Math.abs(Math.sin(s.phase + t * s.speed));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(253,230,138,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  })();

  // ── Audio ─────────────────────────────────────────────────────────────────
  const AC = new (window.AudioContext || window.webkitAudioContext)();

  function playTone(freqs, dur, type = 'sine', vol = 0.18) {
    freqs.forEach(({ f, t = 0, d = dur }) => {
      const o = AC.createOscillator();
      const g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = type;
      o.frequency.setValueAtTime(f, AC.currentTime + t);
      g.gain.setValueAtTime(0, AC.currentTime + t);
      g.gain.linearRampToValueAtTime(vol, AC.currentTime + t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + t + d);
      o.start(AC.currentTime + t);
      o.stop(AC.currentTime + t + d + 0.05);
    });
  }

  function playNoise(dur = 0.12, vol = 0.08) {
    const buf  = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource();
    const g   = AC.createGain();
    const flt = AC.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 1200; flt.Q.value = 0.8;
    src.buffer = buf;
    src.connect(flt); flt.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    src.start(); src.stop(AC.currentTime + dur + 0.05);
  }

  const EMOJI_SOUNDS = {
    '❤️': () => playTone([{ f:523 }, { f:659, t:.08 }, { f:784, t:.16 }], .22, 'sine', .14),
    '🔥': () => { playNoise(.18, .12); playTone([{ f:180, t:.02 }], .18, 'sawtooth', .07); },
    '😂': () => playTone([
      { f:600,t:0,d:.07 },{ f:700,t:.08,d:.07 },{ f:600,t:.16,d:.07 },
      { f:700,t:.24,d:.07 },{ f:800,t:.32,d:.09 }
    ], .09, 'sine', .13),
    '😮': () => playTone([{ f:880, t:0 }, { f:660, t:.15 }], .28, 'sine', .13),
  };

  function playEmojiSound(emoji) {
    if (AC.state === 'suspended') AC.resume();
    EMOJI_SOUNDS[emoji]?.();
  }

  function playRouletteTick(fast = true) {
    if (AC.state === 'suspended') AC.resume();
    playTone([{ f: fast ? 1200 : 800 }], fast ? 0.04 : 0.07, 'square', 0.08);
  }

  function playRouletteWin() {
    if (AC.state === 'suspended') AC.resume();
    playTone([
      { f:523, t:0,   d:.18 },
      { f:659, t:.18, d:.18 },
      { f:784, t:.36, d:.18 },
      { f:1047,t:.54, d:.5  },
    ], .18, 'sine', .2);
    playTone([
      { f:262, t:.54, d:.5 },
      { f:330, t:.54, d:.5 },
      { f:392, t:.54, d:.5 },
    ], .5, 'triangle', .08);
  }

  // ── Estado ───────────────────────────────────────────────────────────────
  const DISPLAY_MS = 8000;
  const POLL_MS    = 5000;

  const queue    = [];
  const history  = [];
  let showing         = false;
  let totalCount      = 0;
  let wsReady         = false;
  let timerTO         = null;
  let currentPhoto    = null;
  let ws              = null;
  let rouletteRunning = false;
  const knownIds = new Set();

  const voteCounts = { '❤️': 0, '🔥': 0, '😂': 0, '😮': 0 };
  const PILL_IDS   = { '❤️': 'pill-heart', '🔥': 'pill-fire', '😂': 'pill-laugh', '😮': 'pill-wow' };

  // ── WebSocket ────────────────────────────────────────────────────────────
  function connectWS() {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      wsReady = true;
      document.getElementById('wsIndicator').classList.remove('show');
    };
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if      (msg.type === 'init')            msg.photos.forEach(p => enqueue(p));
      else if (msg.type === 'new_photo')       { enqueue(msg.photo); flashBadge(); }
      else if (msg.type === 'vote')            handleVote(msg);
      else if (msg.type === 'start_roulette')  startRoulette();
      else if (msg.type === 'skip_photo')      skipPhoto();
    };
    ws.onclose = () => {
      wsReady = false;
      document.getElementById('wsIndicator').classList.add('show');
      setTimeout(connectWS, 3000);
    };
    ws.onerror = () => ws.close();
    setInterval(() => { if (ws && ws.readyState === 1) ws.send('ping'); }, 20000);
  }

  async function pollQueue() {
    try {
      const data = await fetch(`${API_BASE}/queue`).then(r => r.json());
      data.photos.forEach(p => enqueue(p));
    } catch (_) {}
  }
  setTimeout(() => { if (!wsReady) { pollQueue(); setInterval(pollQueue, POLL_MS); } }, 5000);

  // ── Cola ─────────────────────────────────────────────────────────────────
  function enqueue(photo) {
    if (knownIds.has(photo.id)) return;
    knownIds.add(photo.id);
    queue.push(photo);
    totalCount++;
    document.getElementById('countNum').textContent = totalCount;
    if (!showing) showNext();
  }

  function showNext() {
    if (!queue.length) { showing = false; return; }
    showing = true;
    displayPhoto(queue.shift());
  }

  function skipPhoto() {
    if (timerTO) { clearTimeout(timerTO); timerTO = null; }
    if (queue.length > 0) {
      showing = true;
      displayPhoto(queue.shift());
    } else if (history.length > 1) {
      displayPhoto(history[history.length - 2]);
    } else {
      showing = false;
      currentPhoto = null;
      document.getElementById('idle').classList.remove('hidden');
      document.getElementById('photoImg').classList.remove('visible');
      document.getElementById('vignette').classList.remove('visible');
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'now_showing', photo: null }));
    }
  }

  function displayPhoto(photo) {
    const img      = document.getElementById('photoImg');
    const vignette = document.getElementById('vignette');
    const fill     = document.getElementById('timerFill');

    document.getElementById('idle').classList.add('hidden');
    img.classList.remove('visible');
    vignette.classList.remove('visible');

    Object.keys(voteCounts).forEach(k => voteCounts[k] = 0);
    updateVoteDisplay();

    const tmp = new Image();
    tmp.onload = () => {
      img.src = '';
      img.src = API_BASE + photo.url;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        img.classList.add('visible');
        vignette.classList.add('visible');
      }));
    };
    tmp.onerror = () => setTimeout(showNext, 800);
    tmp.src = API_BASE + photo.url;

    if (!history.length || history[history.length - 1].id !== photo.id) {
      history.push(photo);
    }

    currentPhoto = photo;
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'now_showing', photo }));
    }

    if (timerTO) clearTimeout(timerTO);
    fill.style.transition = 'none';
    fill.style.width = '100%';
    requestAnimationFrame(() => {
      fill.style.transition = `width ${DISPLAY_MS}ms linear`;
      fill.style.width = '0%';
    });
    timerTO = setTimeout(showNext, DISPLAY_MS);
  }

  // ── Votos ────────────────────────────────────────────────────────────────
  function handleVote(msg) {
    if (!currentPhoto || msg.photo_id !== currentPhoto.id) return;
    const counts = msg.counts || {};
    Object.keys(counts).forEach(k => { voteCounts[k] = counts[k]; });
    updateVoteDisplay(msg.emoji);
    spawnFloatingEmoji(msg.emoji);
    playEmojiSound(msg.emoji);
  }

  function updateVoteDisplay(pulsedEmoji) {
    document.getElementById('v-heart').textContent = voteCounts['❤️'] || 0;
    document.getElementById('v-fire').textContent  = voteCounts['🔥'] || 0;
    document.getElementById('v-laugh').textContent = voteCounts['😂'] || 0;
    document.getElementById('v-wow').textContent   = voteCounts['😮'] || 0;

    if (pulsedEmoji && PILL_IDS[pulsedEmoji]) {
      const pill = document.getElementById(PILL_IDS[pulsedEmoji]);
      pill.classList.remove('pulse');
      void pill.offsetWidth; // reflow
      pill.classList.add('pulse');
    }
  }

  function spawnFloatingEmoji(emoji) {
    const el = document.createElement('div');
    el.className = 'float-emoji';
    el.textContent = emoji;
    el.style.left   = (15 + Math.random() * 70) + 'vw';
    el.style.bottom = '90px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  // ── Ruleta ───────────────────────────────────────────────────────────────
  async function startRoulette() {
    if (rouletteRunning) return;
    rouletteRunning = true;

    const overlay = document.getElementById('roulette');
    overlay.classList.add('show');
    document.getElementById('winnerBanner').classList.remove('show');
    document.getElementById('rouletteSub').textContent = 'Cargando fotos...';

    let photos = [];
    try {
      const data = await fetch(`${API_BASE}/votes`).then(r => r.json());
      photos = data.photos.filter(p => p.total_votes > 0);
      if (!photos.length) {
        const q = await fetch(`${API_BASE}/queue`).then(r => r.json());
        photos = q.photos;
      }
    } catch (_) {}

    if (!photos.length) {
      document.getElementById('rouletteSub').textContent = 'Todavía no hay fotos 📷';
      setTimeout(() => { closeRoulette(); rouletteRunning = false; }, 2500);
      return;
    }

    const img     = document.getElementById('rouletteImg');
    const winner  = photos[Math.floor(Math.random() * photos.length)];
    let   idx     = 0;
    const allUrls = photos.map(p => API_BASE + p.url);
    let   interval = 80;
    let   elapsed  = 0;
    document.getElementById('rouletteSub').textContent = '✨ Girando...';

    const spin = setInterval(() => {
      img.src = allUrls[idx % allUrls.length];
      idx++;
      elapsed += interval;

      playRouletteTick(elapsed < 3000);

      if (elapsed > 3000)      interval = 300;
      else if (elapsed > 2000) interval = 180;
      else if (elapsed > 1200) interval = 120;

      if (elapsed > 4500) {
        clearInterval(spin);
        img.src = API_BASE + winner.url;
        document.getElementById('rouletteSub').textContent = '';
        document.getElementById('winnerBanner').classList.add('show');
        playRouletteWin();
      }
    }, interval);
  }

  function closeRoulette() {
    document.getElementById('roulette').classList.remove('show');
    rouletteRunning = false;
  }

  // ── Teclado ──────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape')             closeRoulette();
    if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen?.().catch(() => {});
  });

  document.addEventListener('click', () => {
    document.documentElement.requestFullscreen?.().catch(() => {});
  });

  function flashBadge() {
    const b = document.getElementById('newBadge');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 2400);
  }

  connectWS();
</script>
</body>
</html>
